# 适用机器：公司（Linux）
# 系统 / OS：Linux
# 用途：每次 Gateway 启动前，从 workspace 仓库同步资源限制配置到 systemd，
#       确保 MemoryHigh 等限制在 OpenClaw 更新、重启、刷新后始终生效。
[Service]
ExecStartPre=-/bin/bash -c 'mkdir -p ~/.config/systemd/user/openclaw-gateway.service.d && cp ~/.openclaw/workspace/config/systemd/openclaw-gateway-resource-limits.conf ~/.config/systemd/user/openclaw-gateway.service.d/resource-limits.conf'
