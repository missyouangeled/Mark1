# 适用机器：公司（Linux）
# 系统 / OS：Linux
# 用途：限制 Gateway 内存膨胀，防止 swap 引发 I/O 阻塞 -> 事件循环卡死 -> 健康检查超时
# 注意：不加 CPUQuota，Gateway 是 I/O 密集型，CPU 限制会损害正常响应速度
# 历史:
#   2026-06-xx: 初始 1.2G/1.5G
#   2026-07-20: 提高到 2.0G/3.0G，因为 qmd vsearch 在 CPU 模式下加载嵌入模型需要 ~1.3GB
#              加上 Gateway 自身 ~200MB，1.5G 不够用导致 vsearch 被 SIGKILL
#   2026-07-21: 提高到 3.0G/4.5G，因为 exec 子进程继承 Gateway cgroup，
#              find/git clone/pip install 等操作在 3.0G 限制下被 OOM kill
[Service]
MemoryHigh=3.0G
MemoryMax=4.5G
