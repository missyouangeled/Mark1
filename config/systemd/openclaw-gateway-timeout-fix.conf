# 适用机器：公司（Linux）
# 系统 / OS：Linux
# 用途：延长 Gateway stop timeout，防止 openclaw update 等长耗时操作被 SIGKILL 强行终止
# 原因：2026-06-18 openclaw update 在 shutdown 期间被 TimeoutStopSec=30 的 SIGKILL 打断，
#        导致 openclaw.json 配置损坏，后续 gateway 无法启动（7 连败）
#        TimeoutStopSec 从默认 30s → 60s，给 npm install/doctor 等操作充足退出时间
[Service]
TimeoutStopSec=60
TimeoutStartSec=60
