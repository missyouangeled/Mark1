name: Mark42 CI

on:
  push:
    paths:
      - 'mark42-pkg/**'
      - '.github/workflows/mark42-ci.yml'
    branches: [master, main]
  pull_request:
    paths:
      - 'mark42-pkg/**'
      - '.github/workflows/mark42-ci.yml'

jobs:
  test:
    name: 测试 + 覆盖率 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock pytest-xdist pytest-subprocess
          pip install -e .
        working-directory: mark42-pkg
      
      - name: 运行测试
        run: |
          python -m pytest tests/ --cov=mark42 --cov-report=xml --cov-report=term-missing --tb=short -q --no-header
        working-directory: mark42-pkg
      
      - name: 覆盖率门禁 (≥ 50%)
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', '0'))
          pct = rate * 100
          print(f'覆盖率: {pct:.1f}%')
          if pct < 50:
              print(f'❌ 覆盖率 {pct:.1f}% 低于门禁 50%')
              exit(1)
          else:
              print(f'✅ 覆盖率 {pct:.1f}% 通过门禁 50%')
          "
        working-directory: mark42-pkg
        continue-on-error: true

  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: 安装 ruff
        run: pip install ruff
      
      - name: Ruff 检查
        run: ruff check mark42-pkg/mark42/
        continue-on-error: true
      
      - name: 检查裸 except
        run: |
          result=$(grep -rn "except:" mark42-pkg/mark42/ --include="*.py" || true)
          if [ -n "$result" ]; then
            echo "⚠️ 发现裸 except:"
            echo "$result"
            exit 1
          else
            echo "✅ 无裸 except"
          fi
      
      - name: 检查 print 语句（daemon 函数应使用 logging）
        run: |
          result=$(grep -rn "^\s*print(" mark42-pkg/mark42/ --include="*.py" | grep -v "test_" | grep -v "__pycache__" || true)
          if [ -n "$result" ]; then
            echo "⚠️ 发现 print 语句:"
            echo "$result"
          else
            echo "✅ 无裸 print"
          fi
      
      - name: 检查 shell=True
        run: |
          result=$(grep -rn "shell=True" mark42-pkg/mark42/ --include="*.py" || true)
          if [ -n "$result" ]; then
            echo "❌ 发现 shell=True:"
            echo "$result"
            exit 1
          else
            echo "✅ 无 shell=True"
          fi

  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: pip-audit 依赖漏洞扫描
        run: |
          pip install pip-audit
          cd mark42-pkg
          pip-audit --strict
      
      - name: 检查硬编码路径
        run: |
          result=$(grep -rn "/mnt/data" mark42-pkg/mark42/ --include="*.py" | grep -v "#" | grep -v '"""' || true)
          if [ -n "$result" ]; then
            echo "❌ 发现 /mnt/data 硬编码:"
            echo "$result"
            exit 1
          else
            echo "✅ 无 /mnt/data 硬编码"
          fi
      
      - name: 检查硬编码 API key
        run: |
          result=$(grep -rnE "(sk-[a-zA-Z0-9]{20,}|ark-[a-zA-Z0-9-]{20,})" mark42-pkg/mark42/ --include="*.py" | grep -v test | grep -v mock | grep -v "#" || true)
          if [ -n "$result" ]; then
            echo "❌ 发现硬编码 API key:"
            echo "$result"
            exit 1
          else
            echo "✅ 无硬编码 API key"
          fi
