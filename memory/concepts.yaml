# 语义概念映射 — Layer S
# 桥接"用户日常用语 → 系统关键词"，不依赖 embedding
# 手工维护 + 自动种子（从 MEMORY_INDEX.json metadata 生成）

# ── 意图分类模式 ──
intent_patterns:
  system_ops:
    patterns: ["怎么", "如何", "配置", "设置", "改", "调整", "开关", "启动", "关闭", "重启", "修", "修复", "检查", "诊断"]
    description: "系统操作/配置/修复类查询"
    weight_files:
      memory/rules/work-prefs.md: 1.5
      memory/rules/tech-prefs.md: 1.3
  rule_lookup:
    patterns: ["规则", "规定", "偏好", "怎么规定的", "应该", "必须", "不要", "禁止"]
    description: "规则/偏好查找"
    weight_files:
      memory/rules/work-prefs.md: 1.5
      memory/rules/safety-prefs.md: 1.4
      memory/rules/chat-prefs.md: 1.3
  chat_preference:
    patterns: ["聊天", "陪伴", "语音", "回复", "说话", "语气", "风格", "千千", "角色"]
    description: "聊天/陪伴偏好查询"
    weight_files:
      memory/rules/chat-prefs.md: 1.8
  safety_check:
    patterns: ["安全", "风险", "危险", "崩坏", "崩溃", "凭据", "密码", "隐私", "泄露"]
    description: "安全/隐私/风险查询"
    weight_files:
      memory/rules/safety-prefs.md: 2.0
  recall:
    patterns: ["上次", "之前", "那个", "还记得", "以前", "那次", "说过"]
    description: "回忆/上下文查询"
  memory_lookup:
    patterns: ["记忆", "档案", "人物", "故事", "回忆", "过去"]
    description: "记忆库查询"
    weight_files:
      memory/stories.md: 1.5
      memory/people.md: 1.5

# ── 同义词映射 ──
synonyms:
  聊天: ["对话", "会话", "conversation", "chat"]
  监工: ["supervisor", "watcher", "守护", "监督"]
  清理: ["删除", "移除", "清除", "释放", "clean", "cleanup"]
  崩溃: ["崩坏", "卡死", "挂掉", "不可用", "crash", "死机"]
  前端: ["界面", "页面", "UI", "webchat", "Control UI", "dashboard"]
  备份: ["保存", "存档", "导出", "backup", "snapshot"]
  磁盘: ["空间", "容量", "存储", "disk", "storage"]
  分身: ["后台", "后台任务", "子代理", "subagent", "worker"]
  升级: ["更新", "update", "upgrade"]
  修复: ["修补", "patch", "fix", "修理"]
  下载: ["获取", "抓取", "保存视频", "download"]
  安装前: ["安装前审查", "安全审查", "预检"]
  图像生成: ["画图", "生成图片", "AI绘画", "image generation"]
  语音生成: ["TTS", "语音合成", "文字转语音", "配音", "tts"]
  凭据: ["密钥", "token", "密码", "API key", "credential"]

# ── 概念桥接（用户口语 → 系统关键词/文件） ──
concept_bridges:
  空间清理:
    query_terms: ["清理", "释放", "空间", "磁盘", "缓存", "容量"]
    expand_keywords: [session-size-watcher, scratch-cleanup, 清理, 空间, 缓存, 磁盘, 释放]
    prefer_files: [memory/rules/work-prefs.md]
    description: "清理/释放磁盘空间 → session-size-watcher + scratch-cleanup"

  前端配置:
    query_terms: ["前端", "界面", "UI", "页面", "显示", "外观"]
    expand_keywords: ["Control UI", branding, model-selector, session, 前端, 界面, 补丁, 品牌, 主题]
    prefer_files: [memory/rules/tech-prefs.md, memory/rules/work-prefs.md]

  语音回复:
    query_terms: ["语音", "回复", "说话", "声音", "TTS", "配音", "读", "念"]
    expand_keywords: [ChatTTS, TTS, XTTS, 语音回复, 语音文件, 克隆, 音色, 语速, wav]
    prefer_files: [memory/rules/chat-prefs.md, memory/rules/tech-prefs.md]

  监工配置:
    query_terms: ["监工", "supervisor", "watcher", "守护", "监控", "自动"]
    expand_keywords: [监工规则, 监工服务, 监工状态, supervisor, 后台, 分身, 守护, force_on, force_off]
    prefer_files: [memory/rules/work-prefs.md]

  视频下载:
    query_terms: ["下载", "视频", "抖音", "douyin", "平台", "抓取"]
    expand_keywords: [视频下载, 下载, 抖音, 平台, download-platform-video, 候选, ffprobe]
    prefer_files: [memory/rules/work-prefs.md]

  大工程操作:
    query_terms: ["大量", "批量", "工程", "重命名", "scratch", "文件多"]
    expand_keywords: [大工程, 批量改名, scratch, heavy-task, preflight, 文件量, 预检, 分批]
    prefer_files: [memory/rules/work-prefs.md]

  安装安全审查:
    query_terms: ["安装", "审查", "安全", "检查", "审计", "verify"]
    expand_keywords: [安装前安全审查, 安装前, 审查, 崩坏案例, 凭据, 病毒, 木马, 白名单]
    prefer_files: [memory/rules/safety-prefs.md, memory/rules/tech-prefs.md]

  数据盘备份:
    query_terms: ["备份", "数据盘", "快照", "恢复", "丢失", "还原"]
    expand_keywords: [session-backup, context-summary, 备份, 快照, 数据盘, 恢复, /mnt/data]
    prefer_files: [memory/rules/work-prefs.md]

  模型切换:
    query_terms: ["模型", "切换", "换模型", "model", "provider"]
    expand_keywords: [model-selector, resolved, 模型, 切换, 主会话, 默认模型, provider]
    prefer_files: [memory/rules/tech-prefs.md, memory/rules/work-prefs.md]
